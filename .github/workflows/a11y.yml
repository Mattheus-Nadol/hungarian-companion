name: Automated Accessibility Check

on:
  push:
    branches: [ main ]
  pull_request:
    paths: [ '**' ]

jobs:
  pa11y-check:
    name: pa11y accessibility checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install global tools
        run: |
          npm install -g http-server pa11y

      - name: Start static server
        run: |
          npx http-server . -p 8000 > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: npx wait-on http://localhost:8000

      - name: Run accessibility checks (root)
        run: |
          npx pa11y http://localhost:8000 --standard WCAG2AA --timeout 30000 --reporter json --chrome-launcher-args "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage" > pa11y-root.json || true
          node -e "const fs=require('fs'); const p='./pa11y-root.json'; let r=[]; if (fs.existsSync(p)) { const c=fs.readFileSync(p,'utf8').trim(); if (c) try { r=JSON.parse(c); } catch(e){ r=[] } } console.log('pa11y-root issues:', Array.isArray(r)?r.length:0); process.exit(Array.isArray(r)&&r.length>0?1:0)"

      - name: Run accessibility checks (Explore view)
        run: |
          npx pa11y "http://localhost:8000/#/explore" --standard WCAG2AA --timeout 30000 --reporter json --chrome-launcher-args "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage" > pa11y-explore.json || true
          node -e "const fs=require('fs'); const p='./pa11y-explore.json'; let r=[]; if (fs.existsSync(p)) { const c=fs.readFileSync(p,'utf8').trim(); if (c) try { r=JSON.parse(c); } catch(e){ r=[] } } console.log('pa11y-explore issues:', Array.isArray(r)?r.length:0); process.exit(Array.isArray(r)&&r.length>0?1:0)"

      - name: Run accessibility checks (sample word)
        run: |
          npx pa11y "http://localhost:8000/#/word/1" --standard WCAG2AA --timeout 30000 --reporter json --chrome-launcher-args "--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage" > pa11y-word1.json || true
          node -e "const fs=require('fs'); const p='./pa11y-word1.json'; let r=[]; if (fs.existsSync(p)) { const c=fs.readFileSync(p,'utf8').trim(); if (c) try { r=JSON.parse(c); } catch(e){ r=[] } } console.log('pa11y-word1 issues:', Array.isArray(r)?r.length:0); process.exit(Array.isArray(r)&&r.length>0?1:0)"

      - name: Upload pa11y JSON reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-reports
          path: |
            pa11y-root.json
            pa11y-explore.json
            pa11y-word1.json

      - name: Comment on PR with a11y report link
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const prNumber = context.payload.pull_request && context.payload.pull_request.number;
            if (!prNumber) {
              core.info('No pull request found in context; skipping comment.');
            } else {
              const body = `🚨 Accessibility checks detected issues.\n\nWorkflow run: ${runUrl}\n\nArtifacts: pa11y-reports (pa11y-root.json, pa11y-explore.json, pa11y-word1.json)\n\nPlease download the artifacts from the workflow run to inspect details.`;
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, body });
            }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-server-logs
          path: |
            server.log
            server.pid
