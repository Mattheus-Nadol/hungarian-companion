name: Automated Accessibility Check

on:
  push:
    branches: [ main ]
  pull_request:
    paths: [ '**' ]

jobs:
  pa11y-check:
    name: pa11y accessibility checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install global tools
        run: |
          npm install -g http-server pa11y

      - name: Start static server
        run: |
          npx http-server . -p 8000 > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server
        run: npx wait-on http://localhost:8000

      - name: Run accessibility checks (root)
        run: |
          npx pa11y http://localhost:8000 --standard WCAG2AA --timeout 30000 --reporter json > pa11y-root.json || true
          node -e "const fs=require('fs'); const p='./pa11y-root.json'; const r=fs.existsSync(p)?JSON.parse(fs.readFileSync(p)):[]; console.log('pa11y-root issues:', Array.isArray(r)?r.length:0); process.exit(Array.isArray(r)&&r.length>0?1:0)"

      - name: Run accessibility checks (Explore view)
        run: |
          npx pa11y "http://localhost:8000/#/explore" --standard WCAG2AA --timeout 30000 --reporter json > pa11y-explore.json || true
          node -e "const fs=require('fs'); const p='./pa11y-explore.json'; const r=fs.existsSync(p)?JSON.parse(fs.readFileSync(p)):[]; console.log('pa11y-explore issues:', Array.isArray(r)?r.length:0); process.exit(Array.isArray(r)&&r.length>0?1:0)"

      - name: Run accessibility checks (sample word)
        run: |
          npx pa11y "http://localhost:8000/#/word/1" --standard WCAG2AA --timeout 30000 --reporter json > pa11y-word1.json || true
          node -e "const fs=require('fs'); const p='./pa11y-word1.json'; const r=fs.existsSync(p)?JSON.parse(fs.readFileSync(p)):[]; console.log('pa11y-word1 issues:', Array.isArray(r)?r.length:0); process.exit(Array.isArray(r)&&r.length>0?1:0)"

      - name: Upload pa11y JSON reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-reports
          path: |
            pa11y-root.json
            pa11y-explore.json
            pa11y-word1.json

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-server-logs
          path: |
            server.log
            server.pid
