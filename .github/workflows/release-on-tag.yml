name: Create release from tag

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create the release for (e.g. v0.5)'
        required: true
        default: 'v0.5'

jobs:
  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble release body
        id: assemble_body
        env:
          DISPATCH_TAG: "${{ github.event.inputs.tag || '' }}"
        run: |
          set -euo pipefail
          # Resolve tag in this order:
          # 1) workflow_dispatch input `tag`
          # 2) if GITHUB_REF is a tag refs/tags/* use that
          # 3) if GITHUB_REF is a branch refs/heads/* treat as no-tag (sanitize)
          if [ -n "${DISPATCH_TAG:-}" ]; then
            tag="$DISPATCH_TAG"
          elif [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_REF:-}" == refs/heads/* ]]; then
            # branch ref; no tag available
            tag=""
          else
            tag="${GITHUB_REF:-}"
          fi
          # prefer releases/RELEASE_NOTES_<tag>.md, then root RELEASE_NOTES_<tag>.md
          notes_file_releases="releases/RELEASE_NOTES_${tag}.md"
          notes_file_root="RELEASE_NOTES_${tag}.md"
          if [ -f "$notes_file_releases" ]; then
            body=$(cat "$notes_file_releases")
          elif [ -f "$notes_file_root" ]; then
            body=$(cat "$notes_file_root")
          else
            # fall back to the annotated tag message (if annotated)
            body=$(git for-each-ref --format='%(contents)' "refs/tags/${tag}")
            if [ -z "$body" ]; then
              if [ -n "${tag}" ]; then
                body="Release ${tag}"
              else
                body="Release (no tag provided)"
              fi
            fi
          fi
          # export to GITHUB_OUTPUT for subsequent steps using a unique delimiter
          DELIM="DELIM_$(date +%s%N)"
          echo "body<<${DELIM}" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$body" > /tmp/release_body.txt
          cat /tmp/release_body.txt >> "$GITHUB_OUTPUT"
          echo "${DELIM}" >> "$GITHUB_OUTPUT"
          # also export the resolved tag so actions can use it
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.assemble_body.outputs.tag }}
          release_name: ${{ steps.assemble_body.outputs.tag }}
          body: ${{ steps.assemble_body.outputs.body }}
          draft: false
          prerelease: false
