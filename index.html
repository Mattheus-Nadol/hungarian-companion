<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hungarian Companion</title>
<style>
body{margin:0;font-family:system-ui;background:#111827;color:#f3f4f6}
header{padding:20px;background:#1f2937;position:sticky;top:0}
h1{margin:0}.wrap{max-width:900px;margin:auto}
input{width:100%;padding:12px;border-radius:8px;border:none;margin-top:12px}
.card{background:#1f2937;margin:16px 0;padding:16px;border-radius:12px}
.tag{display:inline-block;background:#374151;padding:2px 8px;border-radius:999px;font-size:.8em}
.ex{margin-top:8px;color:#d1d5db}
</style></head><body>
<header><div class="wrap"><h1>🇭🇺 Hungarian Companion</h1>
<input id="q" placeholder="Search Hungarian, Polish or English..." oninput="render()"></div></header>
<div class="wrap" id="cards"></div>
<script>
const words=[
{hu:"szeret",pl:"lubić, kochać",en:"like / love",pattern:"General liking",family:"",example:"Szeretem a pizzát."},
{hu:"kedvel",pl:"darzyć sympatią",en:"be fond of",pattern:"Less emotional than szeret",family:"",example:"Kedvelem Pétert."},
{hu:"tetszik",pl:"podobać się",en:"be pleasing",pattern:"Thing + tetszik + nekem",family:"",example:"Tetszik nekem ez a könyv."},
{hu:"ízlik",pl:"smakować",en:"taste good",pattern:"Thing + ízlik + nekem",family:"",example:"Ízlik nekem a pizza."},
{hu:"szó",pl:"słowo",en:"word",pattern:"Root",family:"szó → szól → szólok",example:"Egy szó."},
{hu:"szól",pl:"dać znać, odezwać się",en:"let someone know",pattern:"Communication",family:"szó",example:"Majd szólok."},
{hu:"mond",pl:"mówić",en:"say / tell",pattern:"Focus on message",family:"",example:"Mit mondasz?"},
{hu:"óta",pl:"od... do teraz",en:"since / for",pattern:"Uses Present Tense",family:"",example:"2020 óta itt lakom."}
];
function render(){
let f=document.getElementById('q').value.toLowerCase();
let out=document.getElementById('cards'); out.innerHTML="";
words.filter(w=>JSON.stringify(w).toLowerCase().includes(f)).forEach(w=>{
out.innerHTML+=`<div class="card"><h2>${w.hu}</h2>
<div><span class="tag">PL</span> ${w.pl}</div>
<div><span class="tag">EN</span> ${w.en}</div>
<div><span class="tag">Pattern</span> ${w.pattern}</div>
${w.family?`<div><span class="tag">Family</span> ${w.family}</div>`:""}
<div class="ex"><b>Example:</b> ${w.example}</div></div>`;
});
}
render();
</script></body></html>
